services:
  - type: web
    name: ds-royal-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: "empire2026"
    plan: free
    healthCheckPath: /health
